name: Build and Deploy Book

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Get Watson repository commit hash
        id: watson-version
        run: |
          WATSON_COMMIT=$(git ls-remote https://github.com/WatsonProver/watson.git HEAD | awk '{print $1}')
          echo "commit=$WATSON_COMMIT" >> $GITHUB_OUTPUT

      - name: Cache Watson binary
        id: cache-watson
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/watson
          key: watson-${{ runner.os }}-${{ steps.watson-version.outputs.commit }}

      - name: Clone and build Watson
        if: steps.cache-watson.outputs.cache-hit != 'true'
        env:
          RUSTFLAGS: ""
        run: |
          git clone https://github.com/WatsonProver/watson.git watson-repo
          cd watson-repo/watson
          cargo install --path .

      - name: Check Watson code
        run: watson check

      - name: Build book
        run: watson book --base-path "/"

      - name: Redirect site root to first chapter
        run: echo "/ /chapter-1/ 302" > build/book/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./build/book --project-name=watson-zfc --branch=prod
